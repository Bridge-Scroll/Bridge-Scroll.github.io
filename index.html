<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bridge Scroll - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Bridge Scroll DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://bridge-scroll.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#F7F3EE;
  --surface:#FFFFFF;
  --surface-soft:#FBF8F4;
  --ink:#1C1713;
  --muted:#766C63;
  --faint:#A79D94;
  --line:rgba(28,23,19,.10);
  --line-strong:rgba(28,23,19,.16);
  --accent:#E07B39;
  --accent-soft:rgba(224,123,57,.12);
  --shadow:0 28px 70px -42px rgba(28,23,19,.45);
  --max:1080px;
}

*{box-sizing:border-box}
html,body{height:100%}
html{overflow-x:hidden}
body{
  margin:0;
  min-height:100dvh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  color:var(--ink);
  background:
    radial-gradient(circle at 50% -16%, rgba(224,123,57,.14), transparent 36%),
    linear-gradient(180deg, #FBF8F4 0%, var(--bg) 100%);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
h1,p{margin:0}

.topbar{
  width:100%;
  max-width:var(--max);
  margin:0 auto;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:18px;
  padding:18px clamp(18px,4vw,34px) 10px;
}

.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-width:0;
  font-weight:760;
  font-size:1rem;
  letter-spacing:0;
  white-space:nowrap;
}

.brand img{
  width:28px;
  height:28px;
  border-radius:8px;
  box-shadow:0 0 0 1px var(--line);
}

.nav{
  display:flex;
  align-items:center;
  gap:22px;
  margin-left:8px;
}

.nav a{
  color:var(--muted);
  font-size:.92rem;
  font-weight:560;
  white-space:nowrap;
  transition:color .16s ease;
}

.nav a:hover{color:var(--ink)}
.spacer{flex:1}

.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:0 17px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:rgba(255,255,255,.54);
  color:var(--ink);
  font-size:.9rem;
  font-weight:700;
  white-space:nowrap;
  box-shadow:0 12px 34px -28px rgba(28,23,19,.60);
  transition:border-color .16s ease, transform .16s ease, background .16s ease;
}

.ghost:hover{
  transform:translateY(-1px);
  border-color:rgba(224,123,57,.48);
  background:#FFFFFF;
}

.stage{
  flex:1 1 auto;
  width:100%;
  max-width:var(--max);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:26px;
  padding:8px clamp(18px,4vw,34px) 10px;
  text-align:center;
  min-height:0;
}

.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
}

h1{
  font-size:clamp(2.8rem,7vw,5rem);
  line-height:1.02;
  font-weight:820;
  letter-spacing:0;
}

.value{
  max-width:58ch;
  color:var(--muted);
  font-size:clamp(1rem,1.7vw,1.17rem);
  font-weight:470;
}

.value strong{
  color:var(--ink);
  font-weight:760;
}

.app-card{
  width:min(590px,100%);
  padding:20px;
  border:1px solid var(--line);
  border-radius:22px;
  background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.92));
  box-shadow:var(--shadow);
}

.route{
  display:grid;
  grid-template-columns:minmax(0,1fr) 44px minmax(0,1fr);
  align-items:center;
  gap:12px;
}

.leg{
  min-width:0;
  padding:15px 16px;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--surface-soft);
  text-align:left;
}

.label{
  display:block;
  color:var(--faint);
  font-size:.72rem;
  font-weight:760;
  line-height:1;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.chip{
  min-height:34px;
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  color:var(--ink);
  font-size:1.08rem;
  font-weight:790;
}

.chip img{
  width:30px;
  height:30px;
  flex:0 0 auto;
  border-radius:50%;
  box-shadow:0 0 0 1px var(--line);
}

.chip span{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.switch{
  width:44px;
  height:44px;
  border:1px solid var(--line-strong);
  border-radius:50%;
  display:grid;
  place-items:center;
  color:var(--accent);
  background:#FFFFFF;
  cursor:pointer;
  box-shadow:0 16px 34px -26px rgba(28,23,19,.70);
  transition:transform .16s ease, border-color .16s ease, background .16s ease;
}

.switch span{
  font-size:1.12rem;
  line-height:1;
}

.switch:hover{
  transform:translateY(-1px) rotate(180deg);
  border-color:rgba(224,123,57,.50);
  background:var(--accent-soft);
}

.primary{
  width:100%;
  min-height:56px;
  margin-top:16px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#FFFFFF;
  background:var(--accent);
  font-size:1.05rem;
  font-weight:820;
  box-shadow:0 22px 44px -28px rgba(224,123,57,.85);
  transition:transform .16s ease, box-shadow .16s ease;
}

.primary:hover{
  transform:translateY(-1px);
  box-shadow:0 26px 50px -28px rgba(224,123,57,.95);
}

.footer{
  flex:0 0 auto;
  padding:8px 24px 20px;
  text-align:center;
  color:var(--faint);
  font-size:.86rem;
  font-weight:560;
}

@media(max-width:680px){
  body{background:linear-gradient(180deg, #FBF8F4 0%, var(--bg) 100%)}
  .topbar{
    gap:12px;
    padding:14px 16px 6px;
  }
  .brand{font-size:.95rem}
  .nav{display:none}
  .ghost{
    min-height:36px;
    padding:0 13px;
    font-size:.84rem;
  }
  .stage{
    gap:20px;
    padding:4px 16px 8px;
    justify-content:center;
  }
  .hero{gap:12px}
  h1{font-size:clamp(2.55rem,13vw,3.4rem)}
  .value{
    max-width:33ch;
    font-size:.98rem;
    line-height:1.45;
  }
  .app-card{
    padding:16px;
    border-radius:20px;
  }
  .route{
    grid-template-columns:1fr;
    gap:10px;
  }
  .leg{
    padding:13px 14px;
  }
  .switch{
    width:42px;
    height:42px;
    justify-self:center;
  }
  .switch span{transform:rotate(90deg)}
  .primary{
    min-height:52px;
    margin-top:14px;
  }
  .footer{
    padding:5px 16px 14px;
    font-size:.82rem;
  }
}

@media(max-width:380px){
  .topbar{padding-top:12px}
  .stage{gap:16px}
  h1{font-size:2.45rem}
  .value{font-size:.94rem}
  .app-card{padding:14px}
  .leg{padding:12px 13px}
  .chip{font-size:1rem}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Bridge Scroll</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Bridge Scroll</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Bridge Scroll &mdash; 2026</footer>
</body>
</html>
